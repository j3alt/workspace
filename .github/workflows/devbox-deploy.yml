name: Deploy DevBox Infrastructure

on:
  push:
    branches: [main]
    paths: ['infra/bicep/devbox/**']

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy DevBox
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ vars.DEVBOX_RESOURCE_GROUP }}
          template: infra/bicep/devbox/main.bicep
          parameters: infra/bicep/devbox/main.bicepparam
          failOnStdErr: false
